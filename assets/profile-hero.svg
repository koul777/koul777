<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">People make transformation real</title>
  <desc id="desc">A warm editorial illustration showing people, policy, data, and AI coming together to create better work.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F1"/>
      <stop offset="1" stop-color="#EEE8DB"/>
    </linearGradient>
    <linearGradient id="flow" x1="690" y1="260" x2="1110" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A7F78"/>
      <stop offset="0.55" stop-color="#D97745"/>
      <stop offset="1" stop-color="#E0A23A"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#17324D" fill-opacity="0.055"/>
    </pattern>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#5F5142" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#paper)"/>
  <rect width="1200" height="360" rx="28" fill="url(#dots)"/>
  <path d="M0 327C215 283 353 344 545 314C765 279 947 165 1200 183V360H0V327Z" fill="#2A7F78" fill-opacity="0.055"/>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="66" y="80" fill="#2A7F78" font-size="15" font-weight="750" letter-spacing="2.4">PEOPLE ANALYTICS · CHANGE MANAGEMENT · PUBLIC ADMINISTRATION</text>
    <text x="66" y="145" fill="#17324D" font-size="44" font-weight="760">Rethinking how</text>
    <text x="66" y="198" fill="#17324D" font-size="44" font-weight="760">work gets done.</text>
    <rect x="66" y="229" width="56" height="4" rx="2" fill="#D97745"/>
    <text x="66" y="270" fill="#4D5E67" font-size="19">People, evidence, and technology</text>
    <text x="66" y="298" fill="#4D5E67" font-size="19">moving together toward better work.</text>
  </g>

  <g transform="translate(630 30)" font-family="Segoe UI, Arial, sans-serif">
    <path d="M34 243C122 290 202 257 257 184C311 112 385 87 499 122" stroke="#17324D" stroke-opacity="0.16" stroke-width="18" stroke-linecap="round"/>
    <path id="journey" d="M34 243C122 290 202 257 257 184C311 112 385 87 499 122" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 13"/>

    <g opacity="0.95">
      <circle cx="55" cy="220" r="14" fill="#2A7F78"/>
      <path d="M31 260C31 242 42 232 55 232C68 232 79 242 79 260" fill="#2A7F78"/>
      <circle cx="96" cy="247" r="11" fill="#D97745"/>
      <path d="M77 278C77 264 85 256 96 256C107 256 115 264 115 278" fill="#D97745"/>
      <circle cx="105" cy="198" r="10" fill="#E0A23A"/>
      <path d="M88 227C88 214 95 207 105 207C115 207 122 214 122 227" fill="#E0A23A"/>
      <circle cx="25" cy="270" r="8" fill="#17324D" fill-opacity="0.72"/>
      <path d="M11 293C11 283 17 278 25 278C33 278 39 283 39 293" fill="#17324D" fill-opacity="0.72"/>
    </g>

    <g filter="url(#softShadow)">
      <circle cx="281" cy="171" r="78" fill="#FFFDF8" stroke="#D97745" stroke-width="3"/>
      <circle cx="281" cy="171" r="66" stroke="#D97745" stroke-opacity="0.2" stroke-width="2">
        <animate attributeName="r" values="63;70;63" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;0.08;0.35" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="281" y="157" text-anchor="middle" fill="#D97745" font-size="13" font-weight="750" letter-spacing="1.8">BETTER</text>
      <text x="281" y="187" text-anchor="middle" fill="#17324D" font-size="27" font-weight="780">WORK</text>
    </g>

    <g font-size="12" font-weight="750" letter-spacing="0.8">
      <g transform="translate(179 48)">
        <rect width="90" height="38" rx="19" fill="#E0F0ED" stroke="#2A7F78" stroke-opacity="0.45"/>
        <circle cx="20" cy="19" r="5" fill="#2A7F78"/>
        <text x="34" y="23" fill="#245D59">PEOPLE</text>
      </g>
      <g transform="translate(345 34)">
        <rect width="88" height="38" rx="19" fill="#E8EDF1" stroke="#17324D" stroke-opacity="0.35"/>
        <circle cx="20" cy="19" r="5" fill="#17324D"/>
        <text x="34" y="23" fill="#17324D">POLICY</text>
      </g>
      <g transform="translate(416 207)">
        <rect width="78" height="38" rx="19" fill="#F7E9DE" stroke="#D97745" stroke-opacity="0.45"/>
        <circle cx="20" cy="19" r="5" fill="#D97745"/>
        <text x="34" y="23" fill="#A84F2A">DATA</text>
      </g>
      <g transform="translate(342 267)">
        <rect width="66" height="38" rx="19" fill="#F8EDCF" stroke="#E0A23A" stroke-opacity="0.55"/>
        <circle cx="20" cy="19" r="5" fill="#E0A23A"/>
        <text x="34" y="23" fill="#8A641F">AI</text>
      </g>
    </g>

    <circle r="7" fill="#2A7F78">
      <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
        <mpath href="#journey"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#D97745">
      <animateMotion dur="5s" begin="-1.8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#journey"/>
      </animateMotion>
    </circle>
    <circle r="4" fill="#E0A23A">
      <animateMotion dur="5s" begin="-3.4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#journey"/>
      </animateMotion>
    </circle>
  </g>
</svg>
